# =============================================================================
# CI/CD pipeline for TaskBoard
# =============================================================================
# CI  = Continuous Integration: every push runs tests, linters, and a build to
#       prove the code is in good shape.
# CD  = Continuous Delivery/Deployment: when CI passes on `main`, ship the
#       new image to GCP and restart the app VM with it.
#
# Auth model:
#   We use Workload Identity Federation (WIF) — no JSON keys committed
#   anywhere. GitHub mints a short-lived OIDC token and exchanges it for a
#   GCP access token via a Workload Identity Pool we set up once.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   GCP_PROJECT_ID            e.g. taskboard-learning-1
#   GCP_REGION                e.g. europe-west1
#   GCP_ZONE                  e.g. europe-west1-a
#   GCP_WIF_PROVIDER          projects/<num>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
#   GCP_DEPLOYER_SA           github-deployer@<project>.iam.gserviceaccount.com
#   ARTIFACT_REPO             taskboard          (the Artifact Registry repo name)
#   APP_VM_NAME               taskboard-app
#   DB_HOSTNAME               taskboard-db
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Concurrency: cancel an in-flight deploy if a newer commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workload Identity Federation needs this permission.
permissions:
  contents: read
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # 1) CI — tests + linters. Runs on every push and PR.
  # ---------------------------------------------------------------------------
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Tests (pytest)
        env:
          DATABASE_URL: "sqlite:///./ci.db"
          JWT_SECRET: "ci-only-not-a-real-secret"
        run: pytest -q

  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci || npm install

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (smoke)
        run: npm run build

  # ---------------------------------------------------------------------------
  # 2) Build + push Docker images. Only on `main`.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push images
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.tags.outputs.backend_image }}
      frontend_image: ${{ steps.tags.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4

      # WIF auth — no JSON keys committed anywhere.
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tags
        id: tags
        run: |
          # Use the short commit SHA as the tag — immutable and traceable.
          SHA=$(git rev-parse --short HEAD)
          BASE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}"
          echo "backend_image=${BASE}/backend:${SHA}"   >> "$GITHUB_OUTPUT"
          echo "frontend_image=${BASE}/frontend:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.tags.outputs.backend_image }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.tags.outputs.frontend_image }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/frontend:latest

  # ---------------------------------------------------------------------------
  # 3) Deploy. SSH into the app VM via IAP, pull the new images, restart.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to app VM
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # Pull JWT_SECRET and DB_PASSWORD from Secret Manager and forward them
      # to the VM via env vars passed inside an SSH command. They never get
      # written to a file in the GitHub runner or the repo.
      - name: Fetch secrets
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            jwt_secret:${{ secrets.GCP_PROJECT_ID }}/jwt-secret
            db_password:${{ secrets.GCP_PROJECT_ID }}/db-password

      - name: Deploy on app VM
        env:
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
          DB_HOSTNAME: ${{ secrets.DB_HOSTNAME }}
          JWT_SECRET: ${{ steps.secrets.outputs.jwt_secret }}
          DB_PASSWORD: ${{ steps.secrets.outputs.db_password }}
        run: |
          set -euo pipefail
          gcloud compute ssh ${{ secrets.APP_VM_NAME }} \
            --zone=${{ secrets.GCP_ZONE }} \
            --tunnel-through-iap \
            --command="bash -s" <<EOF
          set -euo pipefail
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

          # Pull the new images.
          sudo docker pull "${BACKEND_IMAGE}"
          sudo docker pull "${FRONTEND_IMAGE}"

          # Build a private bridge network so the two containers can reach each other.
          sudo docker network inspect app-net >/dev/null 2>&1 || sudo docker network create app-net

          # Stop the old containers if any. Use '|| true' so the first deploy doesn't fail.
          sudo docker rm -f taskboard-backend  || true
          sudo docker rm -f taskboard-frontend || true

          # Start the backend.
          sudo docker run -d \
            --name taskboard-backend \
            --restart unless-stopped \
            --network app-net \
            -e DATABASE_URL="postgresql+psycopg://taskboard:${DB_PASSWORD}@${DB_HOSTNAME}:5432/taskboard" \
            -e JWT_SECRET="${JWT_SECRET}" \
            "${BACKEND_IMAGE}"

          # Start the frontend.
          sudo docker run -d \
            --name taskboard-frontend \
            --restart unless-stopped \
            --network app-net \
            -p 80:3000 \
            -e BACKEND_URL="http://taskboard-backend:8000" \
            "${FRONTEND_IMAGE}"

          # Smoke check.
          sleep 5
          curl -fsS http://localhost/healthz
          EOF

      - name: Smoke check from outside
        run: |
          EXT_IP=$(gcloud compute instances describe ${{ secrets.APP_VM_NAME }} \
            --zone=${{ secrets.GCP_ZONE }} \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "External IP: ${EXT_IP}"
          for i in 1 2 3 4 5; do
            if curl -fsS "http://${EXT_IP}/healthz"; then exit 0; fi
            sleep 5
          done
          echo "Healthcheck failed after deploy"
          exit 1
